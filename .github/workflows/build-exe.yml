name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install dependencies
        run: pip install customtkinter scipy numpy Pillow pyinstaller

      - name: Build EXE
        run: pyinstaller --noconfirm --windowed --onefile --name "AVLParser" --icon "icon.ico" --add-data "parse_avl.py;." --add-data "icon.png;." --hidden-import customtkinter app.py

      - name: Package EXE + test files
        run: |
          New-Item -ItemType Directory -Path "dist\AVLParser" -Force
          Copy-Item "dist\AVLParser.exe" "dist\AVLParser\"
          Copy-Item -Recurse "test_files_new" "dist\AVLParser\test_files"
          Compress-Archive -Path "dist\AVLParser\*" -DestinationPath "dist\AVLParser-Windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AVLParser-Windows-x64
          path: dist/AVLParser-Windows-x64.zip

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $env:GITHUB_OUTPUT

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: AVL Parser — Latest Build
          body: |
            **Latest build** from `main` branch (commit ${{ steps.sha.outputs.short }}).

            ### Download
            **AVLParser-Windows-x64.zip** — Contains the app and sample test files.

            ### What's inside
            - `flap/`, `aileron/`, `elevator/`, `rudder/` — Single-surface 2D test data
            - `beta/` — Beta variable 2D test data
            - `3d_tests/alpha_flap/` — 3D: Alpha × Mach × FLAP
            - `3d_tests/beta_elev/` — 3D: Beta × Mach × ELEV
            - `3d_tests/alpha_multi_surface/` — 3D: Alpha × Mach × FLAP + AIL
            - `3d_tests/single_mach/`, `single_angle/` — Edge cases
          files: |
            dist/AVLParser-Windows-x64.zip
          make_latest: true
          prerelease: false
