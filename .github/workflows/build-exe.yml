name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install dependencies
        run: pip install customtkinter scipy numpy Pillow pyinstaller

      - name: Build EXE
        run: pyinstaller --noconfirm --windowed --onefile --name "AVLParser" --icon "icon.ico" --add-data "parse_avl.py;." --add-data "run_generator.py;." --add-data "run_generator_ui.py;." --add-data "icon.png;." --hidden-import customtkinter app.py

      - name: Package EXE + test files + AVL
        run: |
          New-Item -ItemType Directory -Path "dist\AVLParser" -Force
          Copy-Item "dist\AVLParser.exe" "dist\AVLParser\"
          Copy-Item "friend files\avl352.exe" "dist\AVLParser\"
          Copy-Item -Recurse "test_files_new" "dist\AVLParser\test_files"
          Compress-Archive -Path "dist\AVLParser\*" -DestinationPath "dist\AVLParser-Windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AVLParser-Windows-x64
          path: dist/AVLParser-Windows-x64.zip

      # ------------------------------------------------------------
      # Companion app: AVL Mat Validator.  Built independently from
      # the main AVL Parser above — does not modify its output.
      # ------------------------------------------------------------
      - name: Build Validator EXE
        run: pyinstaller --noconfirm --windowed --onefile --name "AVLMatValidator" --icon "validator_icon.ico" --add-data "parse_avl.py;." --add-data "view_mat.py;." --add-data "validator_icon.png;." --hidden-import customtkinter validate_mat.py

      - name: Package Validator EXE
        run: |
          New-Item -ItemType Directory -Path "dist\AVLMatValidator" -Force
          Copy-Item "dist\AVLMatValidator.exe" "dist\AVLMatValidator\"
          Compress-Archive -Path "dist\AVLMatValidator\*" -DestinationPath "dist\AVLMatValidator-Windows-x64.zip"

      - name: Upload Validator artifact
        uses: actions/upload-artifact@v4
        with:
          name: AVLMatValidator-Windows-x64
          path: dist/AVLMatValidator-Windows-x64.zip

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $env:GITHUB_OUTPUT

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.4
          name: AVL Parser v2.4
          body: |
            **AVL Parser v2.4** (commit ${{ steps.sha.outputs.short }}).

            ### What's new in v2.4
            - **Beta-as-dim architecture** — Beta is now a surface-like 3D dim (joins FLAP/AIL/ELEV/RUDD), producing `Beta_CLb`, `Beta_CYb`, `Beta_CDb`, `Beta_Clb`, `Beta_Cmb`, `Beta_Cnb` arrays shaped `(alpha, mach, beta_val)`. The old 2D Beta section (`Beta_CLtot` et al.) has been removed from Full Analysis exports.
            - **File generator** — Beta moved from the angle radio to the Surface dropdown. Each value set is now Mach × Alpha × one of {FLAP, AIL, ELEV, RUDD, Beta}. Filenames like `M0.9A-10B5` for Beta sweeps.
            - **Fix** — Pre-export validation now catches the real invariant (Beta + any surface deflection mixed in the same file), not the obsolete "Alpha + Beta both non-zero" rule. Files like `M0.02A-2B-1` are valid beta-as-dim cases and no longer block export.
            - **Fix** — Pre-export validation runs on a worker thread and uses a fast header-only parse (~100× faster). Clicking Export no longer freezes the window.
            - **Fix** — "Export Blocked" dialog cleanly dismisses via OK / Esc / Return / title-bar X; no more macOS grab-leak causing the dialog to reappear.
            - **UI** — Save dialog opens in `~` on the first export per session (avoids NSSavePanel cold-open on stale iCloud paths); subsequent exports reopen in the last-chosen folder.

            ### v2.3
            - **Fix (data correctness)** — 3D control-surface tables no longer contaminate the zero-deflection row. Previously, parsing a file like `M0.1A0RUDD30` would overwrite the AIL=0 and ELEV=0 buckets with RUDD-influenced derivatives; now files only contribute to the table of the surface they actually vary.
            - **Fix** — "Add Folder" / drag-drop respects the full file limit. The limit check double-counted each file, so the effective cap was half the configured value (e.g. 500 of 1000).
            - **Default file limit raised to 3000** (was 1000).

            ### v2.2
            - **Fix** — δ,M (delta, Mach) tables now correctly use the zero-angle (α=0 or β=0) reference case instead of arbitrary angle values
            - **UI** — Export and Generate buttons are now cross-disabled during processing to prevent conflicts

            ### v2.1
            - **Bugfix** — Fixed incorrect output files when generating more than 25 run cases (AVL 25-case limit)

            ### v2.0
            - **File Generator** — Run AVL analysis directly from the app
            - **Two-column layout** — Value sets on the left, global fixed values on the right
            - **Config persistence** — Fixed parameter values saved across sessions
            - **Input validation** — All inputs validated before generation
            - **Bundled AVL** — `avl352.exe` included in the zip

            ### Download
            **AVLParser-Windows-x64.zip** — Contains the app, `avl352.exe`, and sample test files.
          files: |
            dist/AVLParser-Windows-x64.zip
            dist/AVLMatValidator-Windows-x64.zip
          make_latest: true
          prerelease: false
